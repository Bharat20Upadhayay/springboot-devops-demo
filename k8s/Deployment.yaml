apiVersion: apps/v1
kind: Deployment

metadata:
  name: demo-app

spec:
  replicas: 5

  selector:
    matchLabels:
      app: demo-app

  template:
    metadata:
      labels:
        app: demo-app

    spec:
      containers:
      - name: demo-app
        image: bharat20upadhayay/demo-app:v1
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8081

        readinessProbe:
          httpGet:
            path: /
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10

        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"